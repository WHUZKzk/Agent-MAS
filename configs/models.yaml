# AutoSR — Model Registry Configuration
# All models are routed through OpenRouter (OpenAI-compatible API).
# Provider is set to "openrouter" (handled as OpenAI-SDK + custom api_base).
#
# INVARIANT (enforced by ModelRegistry at startup):
#   defaults.reviewer_a != defaults.reviewer_b   (architectural heterogeneity)

models:
  # --- Screening Reviewers (heterogeneous pair) ---

  model_reviewer_a:
    provider: "openrouter"
    model_id: "deepseek/deepseek-v3.2"
    api_base: "https://openrouter.ai/api/v1"
#    max_context_tokens: 128000
#    supports_vision: false

  model_reviewer_b:
    provider: "openrouter"
    model_id: "google/gemini-3-flash-preview"
    api_base: "https://openrouter.ai/api/v1"
#    max_context_tokens: 1000000
#    supports_vision: true

  # --- General Purpose: Executor / Adjudicator / SkillGenerator ---

  model_general:
    provider: "openrouter"
    model_id: "qwen/qwen3.6-plus:free"
    api_base: "https://openrouter.ai/api/v1"
#    max_context_tokens: 32768
#    supports_vision: false

defaults:
  executor: "model_general"          # ExecutorAgent — extraction, PICO gen, Pearl Growing
  reviewer_a: "model_reviewer_a"     # Screening Reviewer A (DeepSeek V3.2)
  reviewer_b: "model_reviewer_b"     # Screening Reviewer B (Gemini Flash) — DIFFERENT model
  adjudicator: "model_general"       # Blinded adjudication of screening conflicts
  skill_generator: "model_general"   # Skill YAML generation at initialization
