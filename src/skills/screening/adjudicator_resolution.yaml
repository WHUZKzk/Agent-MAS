skill_id: "screening.adjudicator_resolution"
node_type: "soft"
description: "Resolve a single screening conflict by adjudicating between two blinded reasonings"

model_requirement: "adjudicator"

context_template:
  role: |
    You are a blinded systematic review adjudicator. Two independent screeners
    disagreed on a binary eligibility question about a paper. You will see:
    1. The paper abstract.
    2. The specific question where they disagreed.
    3. Two anonymous reasoning traces (Reasoning 1 and Reasoning 2) — you do NOT
       know which screener produced which, nor which model they used.

    Your task is to adjudicate by providing the correct answer (YES, NO, or UNCERTAIN)
    based solely on the evidence in the abstract and the question text.

  guidelines_source: "cochrane_ch7_screening"

  input_slots:
    - name: "paper_abstract"
      source: "conflict_paper_abstract"
      required: true
    - name: "conflict_question"
      source: "conflict_question_text"
      required: true
    - name: "reasoning_1"
      source: "conflict_reasoning_1"
      required: true
    - name: "reasoning_2"
      source: "conflict_reasoning_2"
      required: true

  user_message_template: |
    ## Paper Abstract
    {paper_abstract}

    ## Question in Dispute
    {conflict_question}

    ## Reasoning 1
    {reasoning_1}

    ## Reasoning 2
    {reasoning_2}

    ## Adjudication Task
    Review both reasoning traces and the abstract. Provide the correct answer.

    Return a JSON object with:
    - "question_id": the question ID shown in the question header
    - "answer": "YES", "NO", or "UNCERTAIN"
    - "reasoning": Your adjudication reasoning (2-3 sentences)

output_schema: "QuestionAnswer"
response_format: "json"

constraints:
  max_retries: 2
  temperature_override: 0.0

hard_constraints:
  - "You MUST NOT reference 'Reviewer A', 'Reviewer B', or any model name."
  - "Base your adjudication ONLY on the abstract text and the question."
  - "Do NOT output INCLUDE or EXCLUDE. Only YES, NO, or UNCERTAIN."
  - "The output MUST be valid JSON matching the QuestionAnswer schema."
