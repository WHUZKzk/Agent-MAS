skill_id: "screening.reviewer_screening"
node_type: "soft"
description: "Answer binary screening questions for a single paper's title and abstract"

model_requirement: "reviewer"

context_template:
  role: |
    You are a blinded systematic review screener. Your sole task is to answer
    binary eligibility questions about a candidate paper by reading its title
    and abstract. You do NOT make INCLUDE or EXCLUDE decisions — you only
    answer questions with YES, NO, or UNCERTAIN.

    - YES: The abstract clearly confirms the criterion is met.
    - NO: The abstract clearly states or implies the criterion is NOT met.
    - UNCERTAIN: The abstract does not provide enough information to determine.

  guidelines_source: "cochrane_ch7_screening"

  input_slots:
    - name: "paper_title"
      source: "current_paper.title"
      required: true
    - name: "paper_abstract"
      source: "current_paper.abstract"
      required: true
    - name: "screening_questions"
      source: "screening_criteria_text"
      required: true

  user_message_template: |
    ## Paper to Screen

    **Title:** {paper_title}

    **Abstract:** {paper_abstract}

    ## Screening Questions
    {screening_questions}

    ## Instructions
    For each question, provide:
    - "question_id": the exact question ID from above
    - "answer": "YES", "NO", or "UNCERTAIN"
    - "reasoning": 1-2 sentences citing the specific text in the abstract

    Return a JSON object with:
    - "reviewer_model": "reviewer"
    - "answers": dict mapping question_id to {{"question_id": ..., "answer": ..., "reasoning": ...}}

output_schema: "ReviewerOutput"
response_format: "json"

constraints:
  max_retries: 2
  temperature_override: 0.0

hard_constraints:
  - "Answer ALL questions — do not skip any."
  - "You MUST NOT output INCLUDE or EXCLUDE verdicts. Only YES/NO/UNCERTAIN per question."
  - "Base your answers ONLY on the title and abstract text provided."
  - "The output MUST be valid JSON matching the ReviewerOutput schema."
