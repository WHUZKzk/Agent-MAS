# Skill YAML Meta-Schema
# Spec: docs/04_SKILL_FRAMEWORK.md §2
#
# Every file in src/skills/**/*.yaml MUST conform to this structure.
# SkillRegistry.load() validates against SkillDefinition (Pydantic) at load time.
# Invalid Skills raise an error with the file path and specific failure.
#
# Field reference:
#
# skill_id: string
#   Unique identifier. Format: "{stage}.{skill_name}"
#   MUST match the file path: src/skills/{stage}/{skill_name}.yaml
#
# node_type: "soft"
#   Always "soft". Only SoftNodes have Skills.
#
# description: string
#   Human-readable one-liner describing what this skill does.
#
# model_requirement: "any" | "executor" | "reviewer" | "adjudicator"
#   Which model role to use. Maps to ModelRegistry.defaults.
#     executor    → defaults.executor    (qwen general)
#     reviewer    → defaults.reviewer_a  (deepseek)
#     adjudicator → defaults.adjudicator (qwen general)
#     any         → defaults.executor
#
# context_template:
#   role: string
#     System message / persona. May contain {slot_name} placeholders.
#
#   guidelines_source: string | null
#     Filename (without .md) in src/guidelines/.
#     Loaded at mount time and appended to system message.
#     null = no guidelines needed.
#
#   input_slots:
#     List of data values injected from pipeline state into the user message.
#     - name: string     Variable name in user_message_template
#       source: string   Dot-path into pipeline state dict
#       required: bool   Default true. If true and missing → mount logs warning.
#
#   user_message_template: string
#     Jinja-style template for the user message.
#     References input slots as {slot_name}.
#
# output_schema: string
#   Name of the Pydantic model the LLM output is validated against.
#   e.g. "ReviewerOutput", "RawOutcomeExtraction"
#
# response_format: "json"
#   Always "json" for SoftNodes.
#
# constraints:
#   max_retries: int        Default 2. Max parse/validation retries.
#   temperature_override: float | null
#                           Overrides Agent default. null = use Agent default (0.0).
#
# hard_constraints:
#   List of invariant rules appended to every prompt for this skill.
#   These are methodological invariants that never change regardless of input.

# --- Example (minimal valid Skill YAML) ---
#
# skill_id: "search.example"
# node_type: "soft"
# description: "An example skill"
# model_requirement: "executor"
# context_template:
#   role: "You are a medical librarian."
#   guidelines_source: null
#   input_slots:
#     - name: "review_question"
#       source: "review_config.title"
#       required: true
#   user_message_template: |
#     Review question: {review_question}
# output_schema: "PICOTermSet"
# response_format: "json"
# constraints:
#   max_retries: 2
#   temperature_override: null
# hard_constraints:
#   - "Every PICO dimension MUST have at least 1 term."
