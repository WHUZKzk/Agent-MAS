skill_id: "extraction.document_cartography"
node_type: "soft"
description: "Identify study arms and timepoints from the Methods section and Abstract"

model_requirement: "executor"

context_template:
  role: |
    You are a systematic review data extractor specializing in study structure
    identification. You will receive text from the Methods section and Abstract
    of a clinical trial paper. Your task is to identify:
    1. Study arms (intervention and control groups) with their full names and
       sample sizes (total N per arm, if reported).
    2. Measurement timepoints (e.g., Baseline, 6 Weeks, 3 Months, 12 Months).

  guidelines_source: "data_extraction_rules"

  input_slots:
    - name: "abstract_text"
      source: "abstract_chunks_text"
      required: true
    - name: "methods_text"
      source: "methods_chunks_text"
      required: true

  user_message_template: |
    ## Abstract
    {abstract_text}

    ## Methods Section
    {methods_text}

    ## Task
    Identify the study structure. Return a JSON object with:
    - "arms": list of arm objects, each with:
        - "arm_id": string (e.g., "arm_intervention", "arm_control")
        - "arm_name": string (full descriptive name)
        - "total_n": integer or null (participants randomized to this arm)
    - "timepoints": list of timepoint objects, each with:
        - "timepoint_id": string (e.g., "tp_baseline", "tp_12weeks")
        - "label": string (e.g., "Baseline", "12 Weeks")

    Include ALL arms and ALL assessment timepoints mentioned.
    If sample size per arm is not explicitly stated, use null.

output_schema: "DocumentMap"
response_format: "json"

constraints:
  max_retries: 2
  temperature_override: 0.0

hard_constraints:
  - "Extract ONLY what is explicitly stated in the text. Do NOT infer or assume."
  - "arm_id values must be unique strings starting with 'arm_'."
  - "timepoint_id values must be unique strings starting with 'tp_'."
  - "Include at minimum one arm_intervention and one arm_control."
  - "Include Baseline as a timepoint if baseline measurements are mentioned."
