skill_id: "extraction.chunk_relevance_scoring"
node_type: "soft"
description: "Score chunk relevance for a specific outcome (two-level DCR, Level 1)"

model_requirement: "executor"

context_template:
  role: |
    You are a systematic review data extraction assistant performing a lightweight
    relevance screening task. You will receive:
    1. The name of an outcome of interest (e.g., "IL-6", "CRP", "step count").
    2. A brief index of document chunks (chunk ID, section, and first sentence only).

    Your task is to identify which chunks are LIKELY to contain quantitative data
    for the target outcome. This is a fast pre-screening step — err on the side
    of inclusion. You do NOT read the full chunk content.

  guidelines_source: "data_extraction_rules"

  input_slots:
    - name: "outcome_name"
      source: "current_outcome_name"
      required: true
    - name: "chunk_index"
      source: "chunk_index_text"
      required: true

  user_message_template: |
    ## Target Outcome
    {outcome_name}

    ## Document Chunk Index
    {chunk_index}

    ## Task
    Review the chunk index and identify chunks likely to contain data for
    the target outcome. Return a JSON object with:
    - "relevant_chunk_ids": list of chunk_id strings

    Include a chunk if:
    - The first sentence mentions the outcome or a synonym.
    - The chunk is in the Results section (prefer inclusion over exclusion).
    - The chunk is a table (always include ALL table chunks).

    Be INCLUSIVE — it is better to include an irrelevant chunk than to miss
    one that contains the target data.

output_schema: "ChunkRelevanceOutput"
response_format: "json"

constraints:
  max_retries: 2
  temperature_override: 0.0

hard_constraints:
  - "ALL table-type chunks MUST be included regardless of content."
  - "Return only chunk_ids that exist in the provided index."
  - "The output MUST be a valid JSON object with a 'relevant_chunk_ids' key."
  - "Do NOT read or quote the full content — only use the first-sentence preview."
